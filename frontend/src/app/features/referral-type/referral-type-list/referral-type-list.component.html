<div class="list-container">
  <div class="header">
    <h2 class="page-title">Referral Types</h2>
    <button mat-flat-button color="primary" routerLink="/referral-types/new">
      <mat-icon>add</mat-icon> Add Referral Type
    </button>
  </div>
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="table-controls">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search</mat-label>
          <input matInput [value]="searchValue()" (input)="applyFilter($event)" placeholder="Search..." />
          @if (searchValue()) {
            <button matSuffix mat-icon-button (click)="clearFilter()"><mat-icon>close</mat-icon></button>
          } @else {
            <mat-icon matSuffix>search</mat-icon>
          }
        </mat-form-field>
      </div>
      @if (loading()) {
        <div class="loading-container"><mat-spinner diameter="48"></mat-spinner></div>
      } @else {
        <div class="table-container">
          <table mat-table [dataSource]="dataSource" matSort class="data-table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
              <td mat-cell *matCellDef="let row">{{ row.name }}</td>
            </ng-container>
            <ng-container matColumnDef="code">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Code</th>
              <td mat-cell *matCellDef="let row">{{ row.code }}</td>
            </ng-container>
            <ng-container matColumnDef="guidelineValue">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Guideline Value</th>
              <td mat-cell *matCellDef="let row">{{ row.guidelineValue | currency }}</td>
            </ng-container>
            <ng-container matColumnDef="isActive">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
              <td mat-cell *matCellDef="let row">
                <mat-chip [highlighted]="row.isActive">{{ row.isActive ? 'Active' : 'Inactive' }}</mat-chip>
              </td>
            </ng-container>
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let row">
                <button mat-icon-button matTooltip="Edit" (click)="edit(row)"><mat-icon>edit</mat-icon></button>
                <button mat-icon-button matTooltip="Delete" color="warn" (click)="delete(row)"><mat-icon>delete</mat-icon></button>
              </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            <tr class="mat-row" *matNoDataRow>
              <td class="mat-cell no-data-cell" [attr.colspan]="displayedColumns.length">No data available</td>
            </tr>
          </table>
        </div>
        <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons></mat-paginator>
      }
    </mat-card-content>
  </mat-card>
</div>
