<div class="view-toggle" role="group" aria-label="Toggle list view">
  <button
    type="button"
    class="view-toggle__btn"
    [class.view-toggle__btn--active]="mode === 'card'"
    [attr.aria-pressed]="mode === 'card'"
    (click)="select('card')"
  >
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Cards
  </button>
  <button
    type="button"
    class="view-toggle__btn"
    [class.view-toggle__btn--active]="mode === 'table'"
    [attr.aria-pressed]="mode === 'table'"
    (click)="select('table')"
  >
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    Table
  </button>
</div>
