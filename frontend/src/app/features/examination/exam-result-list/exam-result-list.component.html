<div class="list-container">
  <div class="header">
    <h2 class="page-title">Exam Results</h2>
  </div>
  <div class="command-bar">
    <select class="filter-select" (change)="onExaminationChange(+($event.target as HTMLSelectElement).value)" aria-label="Select examination">
      <option value="" disabled>Select Examination</option>
      @for (exam of examinations(); track exam.id) {
        <option [value]="exam.id">{{ exam.name }}</option>
      }
    </select>
  </div>

  @if (selectedExamId()) {
    <div class="content-card">
      <div class="table-controls">
        <div class="search-bar" role="search">
          <svg class="search-bar__icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-bar__input" [value]="searchValue()" (input)="applyFilter($event)" placeholder="Search results..." aria-label="Search results" />
          @if (searchValue()) {
            <button class="search-bar__clear" (click)="clearFilter()" aria-label="Clear search">
              <mat-icon>close</mat-icon>
            </button>
          }
        </div>
      </div>
        @if (loading()) {
          <div class="loading-container"><mat-spinner diameter="48"></mat-spinner></div>
        } @else {
          <div class="table-container">
            <table mat-table [dataSource]="dataSource" matSort class="data-table">
              <ng-container matColumnDef="studentRollNumber">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Roll Number</th>
                <td mat-cell *matCellDef="let row">{{ row.studentRollNumber }}</td>
              </ng-container>
              <ng-container matColumnDef="studentName">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Student Name</th>
                <td mat-cell *matCellDef="let row">{{ row.studentName }}</td>
              </ng-container>
              <ng-container matColumnDef="marksObtained">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Marks Obtained</th>
                <td mat-cell *matCellDef="let row">{{ row.marksObtained }}</td>
              </ng-container>
              <ng-container matColumnDef="grade">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Grade</th>
                <td mat-cell *matCellDef="let row">{{ row.grade }}</td>
              </ng-container>
              <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
                <td mat-cell *matCellDef="let row">{{ row.status }}</td>
              </ng-container>
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
              <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell no-data-cell" [attr.colspan]="displayedColumns.length">No data available</td>
              </tr>
            </table>
          </div>
          <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons></mat-paginator>
        }
    </div>
  }
</div>
