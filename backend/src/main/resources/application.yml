spring:
  profiles:
    default: prod

  application:
    name: cms-backend

  threads:
    virtual:
      enabled: true

  # Serialize Instant/Date as ISO-8601 UTC strings (e.g. "2026-04-28T08:30:00Z")
  # so the frontend receives UTC timestamps and converts them to local time.
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  # Force Hibernate/JDBC to store and read all timestamp columns in UTC.
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  servlet:
    context-path: /api/v1

# CORS allowed origins — override per profile or environment variable
cors:
  allowed-origins: http://localhost:4200,http://localhost:4300
