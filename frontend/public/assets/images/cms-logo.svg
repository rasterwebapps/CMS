<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72">
  <defs>
    <linearGradient id="icon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="cap-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (56×56 centred at 36,36) ── -->
  <rect x="0" y="8" width="56" height="56" rx="14" fill="url(#icon-bg)"/>
  <ellipse cx="20" cy="24" rx="26" ry="16" fill="rgba(255,255,255,0.06)"/>

  <!-- Cap body -->
  <path d="M18,36 L18,55 A10,4.5 0 0 0 38,55 L38,36" fill="url(#cap-body)"/>
  <ellipse cx="28" cy="36" rx="10" ry="3.6" fill="rgba(255,255,255,0.93)"/>

  <!-- Board diamond -->
  <polygon points="28,25 44,36 28,47 12,36" fill="#ffffff"/>

  <!-- Board centre dot -->
  <circle cx="28" cy="36" r="3" fill="rgba(79,70,229,0.50)"/>
  <circle cx="28" cy="36" r="1.5" fill="#ffffff" opacity="0.92"/>

  <!-- Tassel cord -->
  <line x1="44" y1="36" x2="46" y2="50" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <circle cx="46" cy="52.5" r="2.4" fill="#ffffff" opacity="0.85"/>
  <!-- Tassel threads -->
  <line x1="44.5" y1="54.5" x2="42" y2="62" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="46" y1="55" x2="46" y2="63" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="47.5" y1="54.5" x2="50" y2="62" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>

  <!-- ── Text block ── -->
  <!-- "CMS" — bold product name -->
  <text
    x="72" y="44"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="30"
    font-weight="800"
    letter-spacing="-0.04em"
    fill="url(#title-grad)"
  >CMS</text>

  <!-- "College Management" — subtitle -->
  <text
    x="73" y="60"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="500"
    letter-spacing="0.06em"
    fill="rgba(255,255,255,0.55)"
    text-transform="uppercase"
  >COLLEGE MANAGEMENT</text>
</svg>
