<div class="list-page">
  <app-page-header title="Admissions" subtitle="Manage student admission applications">
    <button actions class="btn-primary" routerLink="/admissions/new">
      <mat-icon>add</mat-icon> New Admission
    </button>
  </app-page-header>

  <div class="command-bar">
    <div class="filter-pill-group">
      <select class="filter-select" [(ngModel)]="selectedStatus" (ngModelChange)="onStatusChange()" aria-label="Filter by status">
        <option value="">All Statuses</option>
        @for (s of statuses; track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>
  </div>

  <div class="content-card">
    @if (loading()) {
      <div class="loading-container"><mat-spinner diameter="36"></mat-spinner></div>
    } @else {
      <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" class="modern-table">
          <ng-container matColumnDef="studentName">
            <th mat-header-cell *matHeaderCellDef>Student</th>
            <td mat-cell *matCellDef="let row"><span class="cell-name">{{ row.studentName }}</span></td>
          </ng-container>
          <ng-container matColumnDef="applicationDate">
            <th mat-header-cell *matHeaderCellDef>Application Date</th>
            <td mat-cell *matCellDef="let row">{{ row.applicationDate }}</td>
          </ng-container>
          <ng-container matColumnDef="academicYear">
            <th mat-header-cell *matHeaderCellDef>Academic Year</th>
            <td mat-cell *matCellDef="let row">{{ row.academicYearFrom }}–{{ row.academicYearTo }}</td>
          </ng-container>
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let row"><cms-status-badge [status]="row.status"></cms-status-badge></td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header"></th>
            <td mat-cell *matCellDef="let row">
              <div class="row-actions">
                <button class="action-btn" matTooltip="View" (click)="view(row)"><mat-icon>visibility</mat-icon></button>
                <button class="action-btn" matTooltip="Edit" (click)="edit(row)"><mat-icon>edit</mat-icon></button>
                <button class="action-btn action-btn--danger" matTooltip="Delete" (click)="delete(row)"><mat-icon>delete</mat-icon></button>
              </div>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns" class="table-row"></tr>
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell empty-state" [attr.colspan]="displayedColumns.length">
              <p class="empty-state__text">No admissions found</p>
            </td>
          </tr>
        </table>
      </div>
      <div class="pagination-wrapper">
        <mat-paginator [pageSizeOptions]="[10, 25, 50]" [pageSize]="10" showFirstLastButtons></mat-paginator>
      </div>
    }
  </div>
</div>
