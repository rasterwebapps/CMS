services:
  postgres:
    image: postgres:17
    container_name: cms-postgres
    environment:
      POSTGRES_DB: cmsdb
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cmsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: cms-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8280
    command:
      - start-dev
      - --import-realm
    ports:
      - "8280:8280"
    volumes:
      - ./infrastructure/keycloak/cms-realm.json:/opt/keycloak/data/import/cms-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
