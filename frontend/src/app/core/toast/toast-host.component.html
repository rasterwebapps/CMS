<div
  class="cms-toast-host"
  role="region"
  aria-label="Notifications"
  aria-live="polite"
>
  @for (toast of toasts(); track toast.id) {
    <div
      class="cms-toast cms-toast--{{ toast.type }}"
      [attr.role]="ariaRoleFor(toast.type)"
    >
      <mat-icon class="cms-toast__icon">{{ iconFor(toast.type) }}</mat-icon>

      <div class="cms-toast__body">
        <p class="cms-toast__message">{{ toast.message }}</p>
      </div>

      <button
        type="button"
        class="cms-toast__close"
        aria-label="Dismiss notification"
        (click)="dismiss(toast.id)"
      >
        <mat-icon>close</mat-icon>
      </button>

      @if (toast.durationMs > 0) {
        <span
          class="cms-toast__progress"
          [style.--cms-toast-duration.ms]="toast.durationMs"
          aria-hidden="true"
        ></span>
      }
    </div>
  }
</div>
