services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: cms-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8280
      KC_PROXY_HEADERS: xforwarded
    command:
      - start-dev
      - --import-realm
    ports:
      - "8280:8280"
    volumes:
      - ./infrastructure/keycloak/cms-realm.json:/opt/keycloak/data/import/cms-realm.json:ro
    networks:
      - cms-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: cms-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://172.17.3.133:5435/cmsdb
      DB_USERNAME: cms
      DB_PASSWORD: cms
      KEYCLOAK_ISSUER_URI: https://122.165.197.93:8443/realms/cms
      KEYCLOAK_JWK_SET_URI: http://keycloak:8280/realms/cms/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: https://122.165.197.93:8443
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - cms-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cms-frontend
    ports:
      - "80:80"
      - "8443:443"
    depends_on:
      - backend
    networks:
      - cms-net
    restart: unless-stopped

networks:
  cms-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/24
