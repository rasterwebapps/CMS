<div class="list-page">
  <app-page-header title="Roll Number Assignment" subtitle="Assign roll numbers to students">
    <button actions mat-flat-button color="primary" [disabled]="saving()" (click)="saveAll()">
      @if (saving()) { <mat-spinner diameter="18"></mat-spinner> } @else { Save All }
    </button>
  </app-page-header>

  <div class="command-bar">
    <div class="filter-pill-group">
      <select class="filter-select" [(ngModel)]="selectedProgramId" (ngModelChange)="onProgramChange()" aria-label="Filter by program">
        <option [ngValue]="null">All Programs</option>
        @for (p of programs(); track p.id) {
          <option [ngValue]="p.id">{{ p.name }}</option>
        }
      </select>

      <select class="filter-select" [(ngModel)]="selectedCourseId" (ngModelChange)="onCourseChange()" aria-label="Filter by course">
        <option [ngValue]="null">All Courses</option>
        @for (c of courses(); track c.id) {
          <option [ngValue]="c.id">{{ c.name }}</option>
        }
      </select>
    </div>
  </div>

  <div class="content-card">
    @if (loading()) {
      <div class="loading-container"><mat-spinner diameter="36"></mat-spinner></div>
    } @else if (assignments().length === 0) {
      <div class="empty-state">
        <p class="empty-state__text">All students have roll numbers assigned.</p>
      </div>
    } @else {
      <div class="table-wrapper">
        <table mat-table [dataSource]="assignments()" class="modern-table">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Student</th>
            <td mat-cell *matCellDef="let row">{{ row.student.fullName }}</td>
          </ng-container>
          <ng-container matColumnDef="programName">
            <th mat-header-cell *matHeaderCellDef>Program</th>
            <td mat-cell *matCellDef="let row">{{ row.student.programName }}</td>
          </ng-container>
          <ng-container matColumnDef="admissionDate">
            <th mat-header-cell *matHeaderCellDef>Admission Date</th>
            <td mat-cell *matCellDef="let row">{{ row.student.admissionDate }}</td>
          </ng-container>
          <ng-container matColumnDef="rollNumber">
            <th mat-header-cell *matHeaderCellDef>Roll Number</th>
            <td mat-cell *matCellDef="let row">
              <input class="field-input field-input--inline roll-input" [(ngModel)]="row.rollNumber" placeholder="Enter roll number" />
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let row">
              <button mat-stroked-button color="primary" (click)="assignOne(row)">Assign</button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns" class="table-row"></tr>
        </table>
      </div>
    }
  </div>
</div>
