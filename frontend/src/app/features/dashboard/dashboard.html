<div class="dashboard-shell">
  @if (activeRole() === 'ROLE_ADMIN' || activeRole() === 'ROLE_COLLEGE_ADMIN') {
    <app-admin-dashboard />
  } @else if (activeRole() === 'ROLE_FRONT_OFFICE') {
    <app-front-office-dashboard />
  } @else if (activeRole() === 'ROLE_CASHIER') {
    <app-cashier-dashboard />
  } @else if (activeRole() === 'ROLE_FACULTY') {
    <app-faculty-dashboard />
  }
</div>
