services:
  postgres:
    image: postgres:17
    container_name: cms-postgres
    environment:
      POSTGRES_DB: cmsdb
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cmsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cms-net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: cms-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8280
    command:
      - start-dev
      - --import-realm
    ports:
      - "8280:8280"
    volumes:
      - ./infrastructure/keycloak/cms-realm.json:/opt/keycloak/data/import/cms-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cms-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: cms-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/cmsdb
      DB_USERNAME: cms
      DB_PASSWORD: cms
      # Issuer URI must match what the browser sees (used to validate the JWT 'iss' claim)
      KEYCLOAK_ISSUER_URI: http://172.17.1.243:8280/realms/cms
      # JWK set is fetched from the internal Docker network to avoid external routing issues
      KEYCLOAK_JWK_SET_URI: http://keycloak:8280/realms/cms/protocol/openid-connect/certs
      # CORS origin is the server IP on port 80 (frontend served by nginx)
      CORS_ALLOWED_ORIGINS: http://172.17.1.243
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - cms-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cms-net
    restart: unless-stopped

networks:
  cms-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/24

volumes:
  postgres_data: