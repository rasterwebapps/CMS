<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" [opened]="sidenavOpened()" class="app-sidenav">
    <div class="sidenav-header">
      <img src="assets/images/logo-icon.png" alt="SKS College" class="app-logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'" />
      <mat-icon class="app-logo" style="display:none">school</mat-icon>
      <span class="app-name">SKS CMS</span>
    </div>
    <mat-nav-list>
      @for (item of filteredNavItems(); track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active-link">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" matTooltip="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">College Management System</span>
      <span class="toolbar-spacer"></span>

      <button mat-icon-button (click)="toggleTheme()" [matTooltip]="darkTheme() ? 'Light mode' : 'Dark mode'">
        <mat-icon>{{ darkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-icon-button [matMenuTriggerFor]="userMenu" matTooltip="Account">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="user-menu-header" mat-menu-item disabled>
          <mat-icon>person</mat-icon>
          <span>{{ authService.username() }}</span>
        </div>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <main class="app-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
