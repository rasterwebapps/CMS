<div class="form-container">
  <div class="header">
    <button mat-icon-button routerLink="/agents"><mat-icon>arrow_back</mat-icon></button>
    <h2 class="page-title">{{ pageTitle() }}</h2>
  </div>
  @if (loading()) {
    <div class="loading-container"><mat-spinner diameter="48"></mat-spinner></div>
  } @else {
    <mat-card appearance="outlined" class="form-card">
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" />
            @if (form.get('name')?.invalid && form.get('name')?.touched) { <mat-error>Name is required</mat-error> }
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="phone" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Area</mat-label>
            <input matInput formControlName="area" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Locality</mat-label>
            <input matInput formControlName="locality" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Allotted Seats</mat-label>
            <input matInput type="number" formControlName="allottedSeats" min="0" />
          </mat-form-field>
          <mat-slide-toggle formControlName="isActive">Active</mat-slide-toggle>
          <div class="form-actions">
            <button mat-stroked-button type="button" routerLink="/agents">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
              @if (saving()) { <mat-spinner diameter="20"></mat-spinner> } @else { {{ isEditMode() ? 'Update' : 'Create' }} }
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  }
</div>
